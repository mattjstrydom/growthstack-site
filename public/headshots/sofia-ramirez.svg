<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="cp"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#4A1050"/>
      <stop offset="100%" stop-color="#190722"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" clip-path="url(#cp)"/>
  <!-- Blazer - burgundy -->
  <path d="M10 200 L10 160 Q40 142 68 150 L100 164 L132 150 Q160 142 190 160 L190 200Z" fill="#7D2020" clip-path="url(#cp)"/>
  <!-- Light blouse -->
  <path d="M87 152 L100 170 L113 152" fill="#F5EEE8" clip-path="url(#cp)"/>
  <!-- Neck -->
  <rect x="88" y="137" width="24" height="22" rx="7" fill="#D0906A"/>
  <!-- Face -->
  <ellipse cx="100" cy="115" rx="37" ry="42" fill="#D0906A"/>
  <!-- Hair - dark brown, fuller/medium length -->
  <!-- Left wide side -->
  <path d="M58 108 L52 172 Q55 180 60 178 L62 112Z" fill="#241008" clip-path="url(#cp)"/>
  <!-- Right wide side -->
  <path d="M142 108 L148 172 Q145 180 140 178 L138 112Z" fill="#241008" clip-path="url(#cp)"/>
  <!-- Top cap -->
  <path d="M60 110 Q64 65 100 58 Q136 65 140 110 Q118 95 100 97 Q82 95 60 110Z" fill="#241008"/>
  <!-- Wavy volume at sides (slightly wider than face) -->
  <path d="M58 110 Q54 130 55 158 Q57 162 60 161 Q58 136 60 112Z" fill="#2D1410" clip-path="url(#cp)"/>
  <path d="M142 110 Q146 130 145 158 Q143 162 140 161 Q142 136 140 112Z" fill="#2D1410" clip-path="url(#cp)"/>
  <!-- Ears -->
  <ellipse cx="63" cy="120" rx="7" ry="10" fill="#D0906A"/>
  <ellipse cx="137" cy="120" rx="7" ry="10" fill="#D0906A"/>
  <!-- Left eye -->
  <ellipse cx="86" cy="115" rx="8" ry="5.5" fill="white"/>
  <circle cx="86" cy="115" r="4" fill="#3A1A0A"/>
  <circle cx="84.6" cy="113.6" r="1.4" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="114" cy="115" rx="8" ry="5.5" fill="white"/>
  <circle cx="114" cy="115" r="4" fill="#3A1A0A"/>
  <circle cx="112.6" cy="113.6" r="1.4" fill="white"/>
  <!-- Eyebrows - arched, expressive -->
  <path d="M77 105 Q86 100 95 104" stroke="#241008" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M105 104 Q114 100 123 105" stroke="#241008" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M98 121 Q95 130 98 134 Q100 136 102 134 Q105 130 102 121" stroke="#B07050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Smile - warm, confident -->
  <path d="M88 142 Q100 153 112 142" stroke="#A05840" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M92 142 Q100 147 108 142" fill="#C07868" opacity="0.6"/>
  <!-- Earring left hint -->
  <circle cx="56" cy="128" r="3" fill="#D4AF37" clip-path="url(#cp)"/>
  <circle cx="144" cy="128" r="3" fill="#D4AF37" clip-path="url(#cp)"/>
</svg>
