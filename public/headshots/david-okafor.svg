<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="cp"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0A3838"/>
      <stop offset="100%" stop-color="#041818"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" clip-path="url(#cp)"/>
  <!-- Dark blazer -->
  <path d="M10 200 L10 158 Q40 140 68 148 L100 162 L132 148 Q160 140 190 158 L190 200Z" fill="#141828" clip-path="url(#cp)"/>
  <!-- Light blue shirt -->
  <path d="M88 150 L100 167 L112 150" fill="#5B9BD5" clip-path="url(#cp)"/>
  <!-- Neck -->
  <rect x="88" y="136" width="24" height="20" rx="6" fill="#7B4A2A"/>
  <!-- Face -->
  <ellipse cx="100" cy="114" rx="38" ry="43" fill="#7B4A2A"/>
  <!-- Short close-cropped hair - very thin layer -->
  <path d="M62 107 Q65 63 100 57 Q135 63 138 107 Q122 100 100 101 Q78 100 62 107Z" fill="#120A04"/>
  <!-- Very thin side strips -->
  <path d="M62 106 L60 118 Q61 122 64 121 L63 107Z" fill="#120A04" clip-path="url(#cp)"/>
  <path d="M138 106 L140 118 Q139 122 136 121 L137 107Z" fill="#120A04" clip-path="url(#cp)"/>
  <!-- Ears -->
  <ellipse cx="62" cy="118" rx="7" ry="10" fill="#7B4A2A"/>
  <ellipse cx="138" cy="118" rx="7" ry="10" fill="#7B4A2A"/>
  <!-- Left eye -->
  <ellipse cx="86" cy="114" rx="8" ry="5.5" fill="white"/>
  <circle cx="86" cy="114" r="4" fill="#1A0800"/>
  <circle cx="84.6" cy="112.6" r="1.4" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="114" cy="114" rx="8" ry="5.5" fill="white"/>
  <circle cx="114" cy="114" r="4" fill="#1A0800"/>
  <circle cx="112.6" cy="112.6" r="1.4" fill="white"/>
  <!-- Eyebrows - straight, strong -->
  <path d="M77 104 Q86 101 95 103" stroke="#120A04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M105 103 Q114 101 123 104" stroke="#120A04" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose - slightly wider, defined -->
  <path d="M97 120 Q93 130 97 135 Q100 137 103 135 Q107 130 103 120" stroke="#5A3018" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Nostrils hint -->
  <path d="M94 133 Q97 136 100 136 Q103 136 106 133" stroke="#5A3018" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Smile - confident, slight -->
  <path d="M89 141 Q100 150 111 141" stroke="#5A3020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M93 141 Q100 145 107 141" fill="#8A5838" opacity="0.5"/>
</svg>
