<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="cp"><circle cx="100" cy="100" r="100"/></clipPath>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1A2F48"/>
      <stop offset="100%" stop-color="#0C1620"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" clip-path="url(#cp)"/>
  <!-- Charcoal blazer -->
  <path d="M10 200 L10 160 Q40 142 68 150 L100 164 L132 150 Q160 142 190 160 L190 200Z" fill="#2A3848" clip-path="url(#cp)"/>
  <!-- White shirt -->
  <path d="M88 152 L100 170 L112 152" fill="#F0F5FF" clip-path="url(#cp)"/>
  <!-- Neck -->
  <rect x="88" y="138" width="24" height="22" rx="7" fill="#F0C8B0"/>
  <!-- Face -->
  <ellipse cx="100" cy="116" rx="37" ry="42" fill="#F0C8B0"/>
  <!-- Hair - medium brown, sleek/pulled back with slight wave -->
  <!-- Top sleek layer -->
  <path d="M63 108 Q67 64 100 57 Q133 64 137 108 Q118 95 100 97 Q82 95 63 108Z" fill="#7A5830"/>
  <!-- Side wisps - not too wide, professional -->
  <path d="M63 107 L61 140 Q62 144 65 143 L64 109Z" fill="#7A5830" clip-path="url(#cp)"/>
  <path d="M137 107 L139 140 Q138 144 135 143 L136 109Z" fill="#7A5830" clip-path="url(#cp)"/>
  <!-- Bun/updo hint at back top -->
  <ellipse cx="100" cy="65" rx="18" ry="10" fill="#8A6840" clip-path="url(#cp)"/>
  <!-- Ears -->
  <ellipse cx="63" cy="120" rx="7" ry="10" fill="#F0C8B0"/>
  <ellipse cx="137" cy="120" rx="7" ry="10" fill="#F0C8B0"/>
  <!-- Small pearl earrings -->
  <circle cx="56" cy="122" r="4" fill="#F8F5F0" clip-path="url(#cp)"/>
  <circle cx="144" cy="122" r="4" fill="#F8F5F0" clip-path="url(#cp)"/>
  <!-- Left eye -->
  <ellipse cx="86" cy="116" rx="8" ry="5.5" fill="white"/>
  <circle cx="86" cy="116" r="4" fill="#1E4070"/>
  <circle cx="84.6" cy="114.6" r="1.4" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="114" cy="116" rx="8" ry="5.5" fill="white"/>
  <circle cx="114" cy="116" r="4" fill="#1E4070"/>
  <circle cx="112.6" cy="114.6" r="1.4" fill="white"/>
  <!-- Eyebrows - refined, slightly arched -->
  <path d="M77 106 Q86 102 95 105" stroke="#7A5830" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M105 105 Q114 102 123 106" stroke="#7A5830" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Nose - refined -->
  <path d="M99 122 Q96 130 99 134 Q100 136 101 134 Q104 130 101 122" stroke="#C8906A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Lips - composed, slight smile -->
  <path d="M89 142 Q100 151 111 142" stroke="#B07060" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M93 142 Q100 146 107 142" fill="#C88878" opacity="0.55"/>
</svg>
